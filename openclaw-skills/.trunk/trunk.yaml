# Trunk configuration: https://docs.trunk.io/cli
version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.7.2
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - node@20.19.5
lint:
  enabled:
    - yamllint@1.37.1
    - trufflehog@3.90.8
    - shfmt@3.6.0
    - shellcheck@0.11.0
    - markdownlint@0.45.0
    - ktlint@1.7.1
    - actionlint@1.7.7
    - eslint@8.57.0
    - git-diff-check
    - prettier@3.6.2
actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-commit
    - trunk-fmt-pre-commit
    - trunk-check-pre-push
  enabled:
    - trunk-upgrade-available
