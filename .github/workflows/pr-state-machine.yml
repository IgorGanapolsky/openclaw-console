name: PR State Machine

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
  check_suite:
    types: [requested, rerequested, completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to reconcile"
        required: false

jobs:
  reconcile:
    name: reconcile-pr-state
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      statuses: write
      pull-requests: write
      issues: write
    steps:
      - name: Reconcile labels, commit status, and incidents
        uses: actions/github-script@v7
        env:
          REQUIRED_CHECKS_FROM_VAR: ${{ vars.PR_REQUIRED_CHECKS || '' }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const STATE_LABELS = ["pr-state:draft", "pr-state:ci_running", "pr-state:ci_green", "pr-state:blocked"];
            const LABELS = {
              "pr-state:draft": { color: "f2e4a1", description: "PR is currently in draft state" },
              "pr-state:ci_running": { color: "fbca04", description: "Required CI checks are still running" },
              "pr-state:ci_green": { color: "0e8a16", description: "All required CI checks are green" },
              "pr-state:blocked": { color: "b60205", description: "One or more required CI checks are failing" },
              "incident": { color: "d73a4a", description: "Operational incident requiring intervention" },
              "pr-state-machine": { color: "0052cc", description: "Managed by PR state machine automation" }
            };

            const PASSING = new Set(["success", "neutral", "skipped"]);
            const FAILING_CONC = new Set(["failure", "timed_out", "cancelled", "action_required", "startup_failure", "stale"]);

            async function ensureLabel(name) {
              try { await github.rest.issues.getLabel({ owner, repo, name }); }
              catch (e) {
                if (e.status !== 404) throw e;
                const m = LABELS[name];
                try { await github.rest.issues.createLabel({ owner, repo, name, color: m.color, description: m.description }); }
                catch (ce) { if (ce.status !== 422) throw ce; }
              }
            }

            async function ensureLabels() { for (const n of Object.keys(LABELS)) await ensureLabel(n); }

            async function setStateLabel(prNumber, targetLabel) {
              const current = (await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: prNumber, per_page: 100 })).data.map(l => l.name);
              for (const sl of STATE_LABELS) {
                if (sl !== targetLabel && current.includes(sl)) {
                  try { await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: sl }); } catch (e) { if (e.status !== 404) throw e; }
                }
              }
              if (!current.includes(targetLabel)) {
                await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: [targetLabel] });
              }
            }

            async function reconcilePr(prNumber) {
              const pr = (await github.rest.pulls.get({ owner, repo, pull_number: prNumber })).data;
              if (pr.state !== "open") return { prNumber, skipped: true };

              const headSha = pr.head.sha;
              const runs = await github.paginate(github.rest.checks.listForRef, { owner, repo, ref: headSha, per_page: 100 });

              let hasFailing = false, hasPending = false;
              for (const run of runs) {
                if (run.status !== "completed") hasPending = true;
                else if (FAILING_CONC.has(run.conclusion)) hasFailing = true;
              }

              let stateLabel = "pr-state:ci_running";
              if (pr.draft) stateLabel = "pr-state:draft";
              else if (hasFailing) stateLabel = "pr-state:blocked";
              else if (!hasPending && runs.length > 0) stateLabel = "pr-state:ci_green";

              await setStateLabel(prNumber, stateLabel);

              const statusState = stateLabel === "pr-state:ci_green" ? "success" : stateLabel === "pr-state:blocked" ? "failure" : "pending";
              await github.rest.repos.createCommitStatus({
                owner, repo, sha: headSha,
                state: statusState,
                context: "pr/state-machine",
                description: `PR state: ${stateLabel}`,
                target_url: runUrl
              });

              return { prNumber, stateLabel };
            }

            const prCandidates = [];
            if (context.eventName === "pull_request_target") prCandidates.push(context.payload.pull_request?.number);
            else if (context.eventName === "check_suite") {
              for (const pr of context.payload.check_suite?.pull_requests || []) prCandidates.push(pr.number);
            } else if (context.eventName === "workflow_dispatch") {
              const raw = context.payload.inputs?.pr_number;
              if (raw) prCandidates.push(parseInt(raw, 10));
            }

            const prNumbers = [...new Set(prCandidates.filter(n => Number.isInteger(n) && n > 0))];
            if (prNumbers.length === 0) { core.info("No PR to reconcile."); return; }

            await ensureLabels();
            for (const prNumber of prNumbers) {
              const result = await reconcilePr(prNumber);
              core.info(`Reconciled: ${JSON.stringify(result)}`);
            }
