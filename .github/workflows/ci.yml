name: CI

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [develop, main]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-kotlin:
    name: Architecture Lint (Kotlin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Architecture ban checks
        run: |
          ERRORS=0
          for f in $(find android -name '*.kt' -not -path '*/build/*'); do
            if grep -n 'AndroidViewModel' "$f" | grep -v '// allow-android-viewmodel' > /dev/null 2>&1; then
              echo ":: $f: Uses AndroidViewModel (use ViewModel instead)"
              ERRORS=$((ERRORS + 1))
            fi
            if grep -n '\.collectAsState()' "$f" > /dev/null 2>&1; then
              echo ":: $f: Uses .collectAsState() instead of .collectAsStateWithLifecycle()"
              ERRORS=$((ERRORS + 1))
            fi
            if grep -n '!!' "$f" | grep -v '// allow-nonnull' > /dev/null 2>&1; then
              echo ":: $f: Uses !! non-null assertion without justification"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS architecture violation(s)"
            exit 1
          fi
          echo "No architecture violations found"

  lint-swift:
    name: Architecture Lint (Swift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Architecture ban checks
        run: |
          ERRORS=0
          for f in $(find ios -name '*.swift'); do
            if grep -n 'force_cast\|as!' "$f" | grep -v '// allow-force-cast' > /dev/null 2>&1; then
              echo ":: $f: Uses force cast (as!) without justification"
              ERRORS=$((ERRORS + 1))
            fi
            if grep -n 'http://' "$f" | grep -v 'localhost\|127.0.0.1\|// allow-http' > /dev/null 2>&1; then
              echo ":: $f: Uses plain HTTP URL (use HTTPS)"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS architecture violation(s)"
            exit 1
          fi
          echo "No architecture violations found"

  skills-test:
    name: Skills Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "openclaw-skills/package-lock.json"

      - name: Install dependencies
        working-directory: openclaw-skills
        run: npm ci

      - name: Lint
        working-directory: openclaw-skills
        run: npx eslint src/ tests/ --max-warnings 0

      - name: Type check
        working-directory: openclaw-skills
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: openclaw-skills
        run: npm test

  android-build:
    name: Android Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

  ios-build:
    name: iOS Build Check
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/OpenClawConsole
        run: xcodegen generate

      - name: Resolve simulator destination
        id: sim
        working-directory: ios/OpenClawConsole
        run: |
          SIM_ID=$(xcodebuild -project OpenClawConsole.xcodeproj -scheme OpenClawConsole -showdestinations 2>/dev/null | \
            grep 'platform:iOS Simulator' | \
            grep -v 'Any iOS Simulator Device' | \
            sed -nE 's/.*id:([0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}).*/\1/p' | \
            head -n 1)
          if [ -z "${SIM_ID}" ]; then
            echo "No valid iOS Simulator destination found."
            xcodebuild -project OpenClawConsole.xcodeproj -scheme OpenClawConsole -showdestinations
            exit 1
          fi
          echo "sim_id=${SIM_ID}" >> "$GITHUB_OUTPUT"
          echo "Using simulator ID: ${SIM_ID}"

      - name: Build for simulator
        working-directory: ios/OpenClawConsole
        run: |
          xcodebuild build \
            -project OpenClawConsole.xcodeproj \
            -scheme OpenClawConsole \
            -destination 'platform=iOS Simulator,id=${{ steps.sim.outputs.sim_id }}' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
