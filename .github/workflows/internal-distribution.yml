name: Internal Distribution

on:
  workflow_run:
    workflows: ["iOS CI", "Android CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to distribute (optional, defaults to the branch or tag you dispatch from)"
        required: false
        type: string

concurrency:
  group: internal-distribution-${{ github.event_name }}-${{ github.event.workflow_run.head_sha || inputs.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate Internal Distribution
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      ref: ${{ steps.decide.outputs.ref }}
      sha: ${{ steps.decide.outputs.sha }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - name: Decide whether to run
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_REF: ${{ inputs.ref }}
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          SHOULD_RUN="false"
          REF=""
          SHA=""
          REASON="not_eligible"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            REF="${INPUT_REF:-$GITHUB_REF_NAME}"
            SHOULD_RUN="true"
            REASON="manual_dispatch"
          elif [[ "$EVENT_NAME" == "workflow_run" && "$WORKFLOW_CONCLUSION" == "success" && "$WORKFLOW_BRANCH" == "develop" ]]; then
            RUNS_JSON="$(
              curl -fsSL \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPOSITORY}/actions/runs?head_sha=${WORKFLOW_SHA}&event=push&status=completed&per_page=100"
            )"
            IOS_SUCCESS="$(printf '%s' "$RUNS_JSON" | jq -r '[.workflow_runs[] | select(.name == "iOS CI" and .conclusion == "success")] | length > 0')"
            ANDROID_SUCCESS="$(printf '%s' "$RUNS_JSON" | jq -r '[.workflow_runs[] | select(.name == "Android CI" and .conclusion == "success")] | length > 0')"
            LATEST_CI_RUN_ID="$(printf '%s' "$RUNS_JSON" | jq -r '[.workflow_runs[] | select((.name == "iOS CI" or .name == "Android CI") and .conclusion == "success")] | max_by(.updated_at) | .id // empty')"

            if [[ "$IOS_SUCCESS" == "true" && "$ANDROID_SUCCESS" == "true" && "$WORKFLOW_RUN_ID" == "$LATEST_CI_RUN_ID" ]]; then
              REF="$WORKFLOW_SHA"
              SHA="$WORKFLOW_SHA"
              SHOULD_RUN="true"
              REASON="both_ci_green_on_${WORKFLOW_SHA}"
            elif [[ "$IOS_SUCCESS" != "true" || "$ANDROID_SUCCESS" != "true" ]]; then
              REASON="waiting_for_both_ci_on_${WORKFLOW_SHA}"
            else
              REASON="not_latest_ci_finisher_for_${WORKFLOW_SHA}"
            fi
          fi

          {
            echo "should_run=$SHOULD_RUN"
            echo "ref=$REF"
            echo "sha=$SHA"
            echo "reason=$REASON"
          } >> "$GITHUB_OUTPUT"
          echo "gate: should_run=$SHOULD_RUN reason=$REASON ref=$REF sha=$SHA"

  ios-testflight-internal:
    name: iOS TestFlight (Internal)
    needs: [gate]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: macos-15
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.ref }}

      - name: Fail fast on required iOS distribution secrets
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          TESTFLIGHT_GROUPS: ${{ vars.TESTFLIGHT_GROUPS }}
          TESTFLIGHT_GROUPS_SECRET: ${{ secrets.TESTFLIGHT_GROUPS }}
          TESTFLIGHT_REQUIRED_TESTER_EMAIL: ${{ vars.TESTFLIGHT_REQUIRED_TESTER_EMAIL }}
          TESTFLIGHT_REQUIRED_TESTER_EMAIL_SECRET: ${{ secrets.TESTFLIGHT_REQUIRED_TESTER_EMAIL }}
        run: |
          set -euo pipefail
          for name in MATCH_GIT_URL MATCH_PASSWORD MATCH_GIT_BASIC_AUTHORIZATION APPSTORE_PRIVATE_KEY APPSTORE_KEY_ID APPSTORE_ISSUER_ID APPLE_TEAM_ID ADMIN_TOKEN; do
            if [ -z "${!name:-}" ]; then
              echo "❌ Missing required secret: $name"
              exit 1
            fi
          done
          if [ -z "${TESTFLIGHT_GROUPS:-}${TESTFLIGHT_GROUPS_SECRET:-}" ]; then
            echo "❌ Missing TestFlight audience. Set TESTFLIGHT_GROUPS as a repo variable or secret."
            exit 1
          fi
          if [ -z "${TESTFLIGHT_REQUIRED_TESTER_EMAIL:-}${TESTFLIGHT_REQUIRED_TESTER_EMAIL_SECRET:-}" ]; then
            echo "❌ Missing required proof target. Set TESTFLIGHT_REQUIRED_TESTER_EMAIL as a repo variable or secret."
            exit 1
          fi

      - name: Preflight release checks (iOS)
        run: bash scripts/preflight-release.sh --platform ios --layer 1

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios/OpenClawConsole

      - name: Install XcodeGen
        run: |
          set -euo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate OpenClawConsole.xcodeproj
        working-directory: ios/OpenClawConsole
        run: |
          set -euo pipefail
          xcodegen generate
          test -f OpenClawConsole.xcodeproj/project.pbxproj

      - name: Configure git credentials for match
        env:
          GIT_AUTH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          git config --global url."https://x-access-token:${GIT_AUTH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Setup signing certificates and profiles (match)
        env:
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane setup
        working-directory: ios/OpenClawConsole

      - name: Build and upload to TestFlight
        env:
          CI: "true"
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          TESTFLIGHT_GROUPS: ${{ vars.TESTFLIGHT_GROUPS }}
          TESTFLIGHT_GROUPS_SECRET: ${{ secrets.TESTFLIGHT_GROUPS }}
          TESTFLIGHT_REQUIRED_TESTER_EMAIL: ${{ vars.TESTFLIGHT_REQUIRED_TESTER_EMAIL }}
          TESTFLIGHT_REQUIRED_TESTER_EMAIL_SECRET: ${{ secrets.TESTFLIGHT_REQUIRED_TESTER_EMAIL }}
        run: bundle exec fastlane beta
        working-directory: ios/OpenClawConsole

      - name: Verify TestFlight build delivery to internal beta groups
        env:
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          TESTFLIGHT_GROUPS: ${{ vars.TESTFLIGHT_GROUPS }}
          TESTFLIGHT_GROUPS_SECRET: ${{ secrets.TESTFLIGHT_GROUPS }}
          TESTFLIGHT_REQUIRED_TESTER_EMAIL: ${{ vars.TESTFLIGHT_REQUIRED_TESTER_EMAIL }}
          TESTFLIGHT_REQUIRED_TESTER_EMAIL_SECRET: ${{ secrets.TESTFLIGHT_REQUIRED_TESTER_EMAIL }}
        run: ruby scripts/assign_testflight_build_to_groups.rb ios/OpenClawConsole/fastlane/testflight_build.json

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-ipa-internal
          path: ios/OpenClawConsole/OpenClawConsole.ipa
          if-no-files-found: warn

  android-firebase-internal:
    name: Android Firebase App Distribution (Internal)
    needs: [gate]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.ref }}

      - name: Fail fast on Android distribution auth and audience inputs
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
          FIREBASE_INTERNAL_TESTERS: ${{ vars.FIREBASE_INTERNAL_TESTERS }}
          FIREBASE_INTERNAL_TESTERS_SECRET: ${{ secrets.FIREBASE_INTERNAL_TESTERS }}
          FIREBASE_INTERNAL_GROUPS: ${{ vars.FIREBASE_INTERNAL_GROUPS }}
          FIREBASE_INTERNAL_GROUPS_SECRET: ${{ secrets.FIREBASE_INTERNAL_GROUPS }}
          FIREBASE_REQUIRED_TESTER_EMAIL: ${{ vars.FIREBASE_REQUIRED_TESTER_EMAIL }}
          FIREBASE_REQUIRED_TESTER_EMAIL_SECRET: ${{ secrets.FIREBASE_REQUIRED_TESTER_EMAIL }}
        run: |
          set -euo pipefail
          normalize_csv() {
            printf '%s' "${1:-}" \
              | tr $'\n\r;' ',' \
              | sed -E 's/[[:space:]]*,[[:space:]]*/,/g; s/^[,[:space:]]+//; s/[,[:space:]]+$//; s/,+/,/g'
          }

          if [ -z "${GOOGLE_SERVICES_JSON:-}" ]; then
            echo "❌ Missing required secret: GOOGLE_SERVICES_JSON"
            exit 1
          fi
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "❌ Missing required secret: ANDROID_KEYSTORE_BASE64"
            exit 1
          fi

          # Explicit authentication precedence (2026 best practices)
          AUTH_METHOD=""
          if [ -n "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            AUTH_METHOD="service_account_primary"
          elif [ -n "${FIREBASE_TOKEN:-}" ]; then
            AUTH_METHOD="ci_token_fallback"
          elif [ -n "${GOOGLE_PLAY_JSON_KEY:-}" ]; then
            AUTH_METHOD="google_play_service_account_fallback"
            echo "⚠️ WARNING: GOOGLE_PLAY_JSON_KEY is only a last-resort fallback for Firebase App Distribution. It must have Firebase App Distribution upload permission on project openclaw-console-mobile."
          else
            echo "❌ Firebase authentication required. Set FIREBASE_SERVICE_ACCOUNT_JSON (preferred), FIREBASE_TOKEN (verified fallback), or GOOGLE_PLAY_JSON_KEY (last-resort fallback)."
            exit 1
          fi

          echo "✅ Firebase auth method: $AUTH_METHOD"

          LEGACY_TESTERS_SECRET="$(normalize_csv "${FIREBASE_INTERNAL_TESTERS_SECRET:-}")"
          LEGACY_TESTERS_VAR="$(normalize_csv "${FIREBASE_INTERNAL_TESTERS:-}")"
          TARGET_GROUPS="$(normalize_csv "${FIREBASE_INTERNAL_GROUPS_SECRET:-}")"
          REQUIRED_TESTER="$(normalize_csv "${FIREBASE_REQUIRED_TESTER_EMAIL_SECRET:-}")"

          if [ -n "$LEGACY_TESTERS_SECRET" ] || [ -n "$LEGACY_TESTERS_VAR" ]; then
            echo "❌ FIREBASE_INTERNAL_TESTERS direct-email distribution is no longer supported. Use FIREBASE_INTERNAL_GROUPS plus FIREBASE_REQUIRED_TESTER_EMAIL secrets."
            exit 1
          fi

          if [ -n "$(normalize_csv "${FIREBASE_INTERNAL_GROUPS:-}")" ] || [ -n "$(normalize_csv "${FIREBASE_REQUIRED_TESTER_EMAIL:-}")" ]; then
            echo "❌ Firebase internal audience must be configured as GitHub Actions secrets only. Remove FIREBASE_INTERNAL_GROUPS and FIREBASE_REQUIRED_TESTER_EMAIL repo variables."
            exit 1
          fi

          if [ -z "$TARGET_GROUPS" ]; then
            echo "❌ Missing FIREBASE_INTERNAL_GROUPS secret. Android internal distribution requires explicit Firebase tester groups."
            exit 1
          fi

          if [ -z "$REQUIRED_TESTER" ]; then
            echo "❌ Missing FIREBASE_REQUIRED_TESTER_EMAIL secret. Android internal distribution requires a proof tester in the target group."
            exit 1
          fi

          if [[ "$REQUIRED_TESTER" == *,* ]]; then
            echo "❌ FIREBASE_REQUIRED_TESTER_EMAIL must contain exactly one tester email."
            exit 1
          fi

      - name: Preflight release checks (Android)
        run: bash scripts/preflight-release.sh --platform android --layer 1

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Create google-services.json
        working-directory: android
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Resolve Firebase app id
        id: firebase
        working-directory: android
        env:
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
        run: |
          set -euo pipefail
          APP_ID="$(jq -r '
            .client[]
            | select(.client_info.android_client_info.package_name == "com.openclaw.console")
            | .client_info.mobilesdk_app_id // empty
          ' app/google-services.json | head -1)"
          if [ -z "$APP_ID" ] && [ -n "${FIREBASE_ANDROID_APP_ID:-}" ]; then
            APP_ID="$FIREBASE_ANDROID_APP_ID"
          fi
          if [ -z "$APP_ID" ]; then
            echo "❌ Could not resolve Firebase Android app id. Set FIREBASE_ANDROID_APP_ID secret or include mobilesdk_app_id in GOOGLE_SERVICES_JSON."
            exit 1
          fi
          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved Firebase app id: $APP_ID"

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/release.keystore

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew assembleRelease --no-daemon

      - name: Verify APK is signed
        run: |
          set -euo pipefail
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK not found at $APK_PATH"
            exit 1
          fi
          # Use apksigner from Android SDK build-tools (available on ubuntu-latest via setup-java)
          APKSIGNER=$(find /usr/local/lib/android/sdk/build-tools -name "apksigner" -type f 2>/dev/null | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            echo "⚠️ apksigner not found via SDK path, trying PATH"
            APKSIGNER=$(command -v apksigner || true)
          fi
          if [ -z "$APKSIGNER" ]; then
            echo "❌ apksigner not available — cannot verify APK signature"
            exit 1
          fi
          "$APKSIGNER" verify --verbose "$APK_PATH"
          echo "✅ APK signature verified"

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Prepare Firebase auth credentials
        id: firebase_auth
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          set -euo pipefail
          AUTH_MODE=""

          # Priority 1: FIREBASE_SERVICE_ACCOUNT_JSON (dedicated Firebase SA)
          if [ -n "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            CREDENTIALS_FILE="${RUNNER_TEMP}/firebase-sa.json"
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$CREDENTIALS_FILE"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDENTIALS_FILE" >> "$GITHUB_ENV"
            AUTH_MODE="firebase_service_account"
            echo "✅ Using FIREBASE_SERVICE_ACCOUNT_JSON for Firebase authentication"
          # Priority 2: FIREBASE_TOKEN (explicit CI fallback)
          elif [ -n "${FIREBASE_TOKEN:-}" ]; then
            AUTH_MODE="ci_token"
            echo "✅ Using FIREBASE_TOKEN for Firebase App Distribution"
          # Priority 3: GOOGLE_PLAY_JSON_KEY (last resort)
          elif [ -n "${GOOGLE_PLAY_JSON_KEY:-}" ]; then
            CREDENTIALS_FILE="${RUNNER_TEMP}/gcp-sa.json"
            printf '%s' "$GOOGLE_PLAY_JSON_KEY" > "$CREDENTIALS_FILE"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDENTIALS_FILE" >> "$GITHUB_ENV"
            AUTH_MODE="google_play_service_account"
            echo "⚠️ Using GOOGLE_PLAY_JSON_KEY as last-resort Firebase fallback"
          else
            echo "❌ No usable Firebase authentication secret found"
            exit 1
          fi

          echo "mode=$AUTH_MODE" >> "$GITHUB_OUTPUT"
          echo "FIREBASE_AUTH_MODE=$AUTH_MODE" >> "$GITHUB_ENV"

      - name: Distribute to internal Firebase tester(s)
        id: firebase_distribute
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_INTERNAL_GROUPS_SECRET: ${{ secrets.FIREBASE_INTERNAL_GROUPS }}
          FIREBASE_REQUIRED_TESTER_EMAIL_SECRET: ${{ secrets.FIREBASE_REQUIRED_TESTER_EMAIL }}
          FIREBASE_APP_ID: ${{ steps.firebase.outputs.app_id }}
          FIREBASE_AUTH_MODE: ${{ steps.firebase_auth.outputs.mode }}
        run: |
          set -Eeuo pipefail
          trap 'rc=$?; echo "❌ Firebase distribution failed at line $LINENO: $BASH_COMMAND (rc=$rc)"; exit $rc' ERR

          normalize_csv() {
            printf '%s' "${1:-}" \
              | tr $'\n\r;' ',' \
              | sed -E 's/[[:space:]]*,[[:space:]]*/,/g; s/^[,[:space:]]+//; s/[,[:space:]]+$//; s/,+/,/g'
          }

          firebase_cli() {
            if [ "${FIREBASE_AUTH_MODE:-}" = "ci_token" ]; then
              firebase "$@" --token "$FIREBASE_TOKEN"
            else
              firebase "$@"
            fi
          }

          # Validate Firebase project configuration
          echo "🔍 Pre-flight Firebase project verification"
          if ! firebase_cli projects:list --json | jq -e '.. | objects | .projectId? // empty | select(. == "openclaw-console-mobile")' > /dev/null; then
            echo "❌ Firebase project openclaw-console-mobile not accessible or does not exist"
            exit 1
          fi

          # Validate package name matches Firebase app
          echo "🔍 Validating package name consistency"
          BUILD_PACKAGE=$(grep -o 'applicationId = "[^"]*"' android/app/build.gradle.kts | sed 's/applicationId = "\(.*\)"/\1/')
          if [ "$BUILD_PACKAGE" != "com.openclaw.console" ]; then
            echo "❌ Package name mismatch: build.gradle.kts=$BUILD_PACKAGE expected=com.openclaw.console"
            exit 1
          fi

          # Determine authentication method with explicit precedence
          AUTH_MODE="${FIREBASE_AUTH_MODE:-}"
          if [ "$AUTH_MODE" = "firebase_service_account" ]; then
            if [ -z "${GOOGLE_APPLICATION_CREDENTIALS:-}" ] || [ ! -f "${GOOGLE_APPLICATION_CREDENTIALS}" ]; then
              echo "❌ FIREBASE_AUTH_MODE=firebase_service_account but GOOGLE_APPLICATION_CREDENTIALS is missing"
              exit 1
            fi
            echo "✅ Using dedicated Firebase service account authentication"
          elif [ "$AUTH_MODE" = "ci_token" ]; then
            if [ -z "${FIREBASE_TOKEN:-}" ]; then
              echo "❌ FIREBASE_AUTH_MODE=ci_token but FIREBASE_TOKEN is missing"
              exit 1
            fi
            echo "✅ Using FIREBASE_TOKEN authentication"
          elif [ "$AUTH_MODE" = "google_play_service_account" ]; then
            if [ -z "${GOOGLE_APPLICATION_CREDENTIALS:-}" ] || [ ! -f "${GOOGLE_APPLICATION_CREDENTIALS}" ]; then
              echo "❌ FIREBASE_AUTH_MODE=google_play_service_account but GOOGLE_APPLICATION_CREDENTIALS is missing"
              exit 1
            fi
            echo "⚠️ Using GOOGLE_PLAY_JSON_KEY for Firebase authentication"
          else
            echo "❌ No valid Firebase authentication found"
            exit 1
          fi

          # Prepare distribution command
          DIST_GROUPS="$(normalize_csv "${FIREBASE_INTERNAL_GROUPS_SECRET:-}")"
          REQUIRED_TESTER="$(normalize_csv "${FIREBASE_REQUIRED_TESTER_EMAIL_SECRET:-}")"
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          DISTRIBUTION_AUTH_MODE="$AUTH_MODE"
          FIREBASE_TOKEN_FALLBACK="${FIREBASE_TOKEN:-}"
          FALLBACK_TOKEN_AVAILABLE="false"

          if [ -n "$FIREBASE_TOKEN_FALLBACK" ] && [ "$AUTH_MODE" != "ci_token" ]; then
            FALLBACK_TOKEN_AVAILABLE="true"
            unset FIREBASE_TOKEN
          fi

          if [ -z "$DIST_GROUPS" ]; then
            echo "❌ FIREBASE_INTERNAL_GROUPS secret is required for Android internal distribution proof."
            exit 1
          fi

          if [ -z "$REQUIRED_TESTER" ]; then
            echo "❌ FIREBASE_REQUIRED_TESTER_EMAIL secret is required for Android internal distribution proof."
            exit 1
          fi

          if [[ "$REQUIRED_TESTER" == *,* ]]; then
            echo "❌ FIREBASE_REQUIRED_TESTER_EMAIL must contain exactly one tester email."
            exit 1
          fi

          # Build Firebase command
          BASE_CMD=(
            firebase appdistribution:distribute
            "$APK_PATH"
            --app "$FIREBASE_APP_ID"
            --project openclaw-console-mobile
            --release-notes "Internal auto-distribution from develop (${GITHUB_SHA})"
          )

          run_distribution() {
            local auth_mode="$1"
            local -a dist_cmd=("${BASE_CMD[@]}")

            if [ "$auth_mode" = "ci_token" ]; then
              dist_cmd+=(--token "$FIREBASE_TOKEN_FALLBACK")
            fi

            if [ -n "$DIST_GROUPS" ]; then
              dist_cmd+=(--groups "$DIST_GROUPS")
            fi

            "${dist_cmd[@]}" 2>&1
          }

          # Execute distribution with retry logic
          ATTEMPT=1
          MAX_ATTEMPTS=3
          SUCCESS=false

          while [ $ATTEMPT -le $MAX_ATTEMPTS ] && [ "$SUCCESS" = false ]; do
            echo "🚀 Firebase distribution attempt $ATTEMPT/$MAX_ATTEMPTS (auth=$DISTRIBUTION_AUTH_MODE)"

            if DIST_OUTPUT="$(run_distribution "$DISTRIBUTION_AUTH_MODE")"; then
              printf '%s\n' "$DIST_OUTPUT"
              SUCCESS=true
              echo "✅ Firebase distribution successful on attempt $ATTEMPT"

              FIREBASE_CONSOLE_URL="$(printf '%s\n' "$DIST_OUTPUT" | sed -n 's/^.*View this release in the Firebase console: //p' | tail -1)"
              TESTING_URL="$(printf '%s\n' "$DIST_OUTPUT" | sed -n 's/^.*Share this release with testers who have access: //p' | tail -1)"
              BINARY_DOWNLOAD_URL="$(printf '%s\n' "$DIST_OUTPUT" | sed -n 's/^.*Download the release binary (link expires in 1 hour): //p' | tail -1)"

              if [ -z "$FIREBASE_CONSOLE_URL" ] || [ -z "$TESTING_URL" ]; then
                echo "❌ Firebase CLI did not return release proof URLs"
                exit 1
              fi

              {
                echo "firebase_console_url=$FIREBASE_CONSOLE_URL"
                echo "testing_url=$TESTING_URL"
                echo "binary_download_url=$BINARY_DOWNLOAD_URL"
                echo "requested_groups=$DIST_GROUPS"
                echo "required_tester=$REQUIRED_TESTER"
                echo "auth_mode=$DISTRIBUTION_AUTH_MODE"
              } >> "$GITHUB_OUTPUT"
            else
              printf '%s\n' "$DIST_OUTPUT"

              if [ "$DISTRIBUTION_AUTH_MODE" = "firebase_service_account" ] && [ "$FALLBACK_TOKEN_AVAILABLE" = "true" ] && printf '%s' "$DIST_OUTPUT" | grep -q 'HTTP Error: 403'; then
                echo "⚠️ FIREBASE_SERVICE_ACCOUNT_JSON can read the project but cannot upload releases (HTTP 403)."
                echo "⚠️ Falling back to FIREBASE_TOKEN for this run."
                echo "⚠️ Grant the service account Firebase App Distribution Admin to restore first-class CI auth."
                DISTRIBUTION_AUTH_MODE="ci_token"
                ATTEMPT=1
                continue
              fi

              if [ "$DISTRIBUTION_AUTH_MODE" = "google_play_service_account" ] && printf '%s' "$DIST_OUTPUT" | grep -q 'HTTP Error: 403'; then
                echo "❌ GOOGLE_PLAY_JSON_KEY does not have Firebase App Distribution upload permission. Set FIREBASE_SERVICE_ACCOUNT_JSON or use FIREBASE_TOKEN."
              fi
              echo "❌ Attempt $ATTEMPT failed"
              if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
                echo "❌ All distribution attempts failed"
                exit 1
              fi
              ((ATTEMPT++))
              sleep 5
            fi
          done

      - name: Verify Firebase distribution actually worked
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_CONSOLE_URL: ${{ steps.firebase_distribute.outputs.firebase_console_url }}
          TESTING_URL: ${{ steps.firebase_distribute.outputs.testing_url }}
          BINARY_DOWNLOAD_URL: ${{ steps.firebase_distribute.outputs.binary_download_url }}
          REQUESTED_GROUPS: ${{ steps.firebase_distribute.outputs.requested_groups }}
          REQUIRED_TESTER: ${{ steps.firebase_distribute.outputs.required_tester }}
          FIREBASE_AUTH_MODE: ${{ steps.firebase_distribute.outputs.auth_mode }}
        run: |
          set -euo pipefail

          echo "🔍 Verifying Firebase distribution delivery"
          FIREBASE_TOKEN_FALLBACK="${FIREBASE_TOKEN:-}"
          if [ "${FIREBASE_AUTH_MODE:-}" != "ci_token" ]; then
            unset FIREBASE_TOKEN
          fi

          normalize_csv() {
            printf '%s' "${1:-}" \
              | tr $'\n\r;' ',' \
              | sed -E 's/[[:space:]]*,[[:space:]]*/,/g; s/^[,[:space:]]+//; s/[,[:space:]]+$//; s/,+/,/g'
          }

          firebase_json() {
            if [ "${FIREBASE_AUTH_MODE:-}" = "ci_token" ]; then
              firebase --json --non-interactive "$@" --token "$FIREBASE_TOKEN_FALLBACK"
            else
              firebase --json --non-interactive "$@"
            fi
          }

          if [ -z "${FIREBASE_CONSOLE_URL:-}" ] || [ -z "${TESTING_URL:-}" ]; then
            echo "❌ Missing Firebase release proof URLs from distribution step"
            exit 1
          fi

          TARGET_GROUPS="$(normalize_csv "${REQUESTED_GROUPS:-}")"
          REQUIRED_TESTER="$(normalize_csv "${REQUIRED_TESTER:-}")"

          if [ -z "$TARGET_GROUPS" ]; then
            echo "❌ Distribution step did not report any Firebase groups"
            exit 1
          fi

          if [ -z "$REQUIRED_TESTER" ]; then
            echo "❌ Distribution step did not report the required Firebase proof tester"
            exit 1
          fi

          if ! curl -fsSIL "$TESTING_URL" >/dev/null; then
            echo "❌ Firebase testing URL is not reachable"
            exit 1
          fi
          echo "🔗 Firebase testing URL is reachable"

          if [ -n "${BINARY_DOWNLOAD_URL:-}" ]; then
            if ! curl -fsSIL "$BINARY_DOWNLOAD_URL" >/dev/null; then
              echo "❌ Firebase binary download URL is not reachable"
              exit 1
            fi
            echo "📦 Firebase binary URL is reachable"
          fi

          if [ -n "$TARGET_GROUPS" ]; then
            GROUPS_JSON="$(firebase_json appdistribution:groups:list -P openclaw-console-mobile)"
            IFS=',' read -r -a TARGET_GROUP_ARRAY <<< "$TARGET_GROUPS"
            for group_alias in "${TARGET_GROUP_ARRAY[@]}"; do
              if ! printf '%s' "$GROUPS_JSON" | jq -e --arg alias "$group_alias" '.result.groups[]? | select((.name | split("/") | last) == $alias)' > /dev/null; then
                echo "❌ Firebase tester group not found: $group_alias"
                exit 1
              fi
            done
          fi

          REQUIRED_IN_GROUP=false
          IFS=',' read -r -a TARGET_GROUP_ARRAY <<< "$TARGET_GROUPS"
          for group_alias in "${TARGET_GROUP_ARRAY[@]}"; do
            GROUP_TESTERS_JSON="$(firebase_json appdistribution:testers:list "$group_alias" -P openclaw-console-mobile)"
            if printf '%s' "$GROUP_TESTERS_JSON" | jq -e --arg email "$REQUIRED_TESTER" '.result.testers[]? | select((.name | split("/") | last) == $email)' > /dev/null; then
              REQUIRED_IN_GROUP=true
              break
            fi
          done

          if [ "$REQUIRED_IN_GROUP" != true ]; then
            echo "❌ Required Firebase tester is not a member of the configured Firebase groups: $REQUIRED_TESTER"
            exit 1
          fi

          echo "👥 Firebase release was distributed to group alias(es): $TARGET_GROUPS"
          echo "📧 Required Firebase proof tester is on the configured group access path: $REQUIRED_TESTER"

          echo "🔗 Firebase console: $FIREBASE_CONSOLE_URL"
          echo "🔗 Firebase testing URL: $TESTING_URL"
          if [ -n "${BINARY_DOWNLOAD_URL:-}" ]; then
            echo "📦 Firebase binary URL: $BINARY_DOWNLOAD_URL"
          fi
          echo "🔐 Firebase auth mode used for distribution: ${FIREBASE_AUTH_MODE:-unknown}"

          echo "✅ Firebase App Distribution verification complete"

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk-internal
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f /tmp/release.keystore
