name: Internal Distribution

on:
  workflow_run:
    workflows: ["iOS CI", "Android CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to distribute (optional, defaults to develop)"
        required: false
        type: string

concurrency:
  group: internal-distribution-${{ github.event_name }}-${{ github.event.workflow_run.head_branch || inputs.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate Internal Distribution
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      ref: ${{ steps.decide.outputs.ref }}
      sha: ${{ steps.decide.outputs.sha }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - name: Decide whether to run
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail

          SHOULD_RUN="false"
          REF=""
          SHA=""
          REASON="not_eligible"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            REF="${INPUT_REF:-$GITHUB_REF_NAME}"
            SHOULD_RUN="true"
            REASON="manual_dispatch"
          elif [[ "$EVENT_NAME" == "workflow_run" && "$WORKFLOW_CONCLUSION" == "success" ]]; then
            REF="$WORKFLOW_SHA"
            SHA="$WORKFLOW_SHA"
            SHOULD_RUN="true"
            REASON="ci_green_on_${WORKFLOW_BRANCH}"
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "gate: should_run=$SHOULD_RUN reason=$REASON ref=$REF sha=$SHA"

  ios-testflight-internal:
    name: iOS TestFlight (Internal)
    needs: [gate]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: macos-15
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.ref }}

      - name: Fail fast on required iOS distribution secrets
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          for name in MATCH_GIT_URL MATCH_PASSWORD MATCH_GIT_BASIC_AUTHORIZATION APPSTORE_PRIVATE_KEY APPSTORE_KEY_ID APPSTORE_ISSUER_ID ADMIN_TOKEN; do
            if [ -z "${!name:-}" ]; then
              echo "❌ Missing required secret: $name"
              exit 1
            fi
          done

      - name: Preflight release checks (iOS)
        run: bash scripts/preflight-release.sh --platform ios --layer 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios/OpenClawConsole

      - name: Install Fastlane
        run: gem install fastlane
        working-directory: ios/OpenClawConsole

      - name: Write App Store Connect key
        env:
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Configure git credentials for match
        env:
          GIT_AUTH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          git config --global url."https://x-access-token:${GIT_AUTH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Setup signing certificates and profiles (match)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane setup
        working-directory: ios/OpenClawConsole

      - name: Build and upload to TestFlight
        env:
          CI: "true"
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane beta
        working-directory: ios/OpenClawConsole

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-ipa-internal
          path: ios/OpenClawConsole/OpenClawConsole.ipa
          if-no-files-found: warn

  android-firebase-internal:
    name: Android Firebase App Distribution (Internal)
    needs: [gate]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.ref }}

      - name: Fail fast on Android distribution auth inputs
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_SERVICES_JSON:-}" ]; then
            echo "❌ Missing required secret: GOOGLE_SERVICES_JSON"
            exit 1
          fi
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "❌ Missing required secret: ANDROID_KEYSTORE_BASE64"
            exit 1
          fi

          # Explicit authentication precedence (2026 best practices)
          AUTH_METHOD=""
          if [ -n "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            AUTH_METHOD="service_account_primary"
          elif [ -n "${GOOGLE_PLAY_JSON_KEY:-}" ]; then
            AUTH_METHOD="service_account_fallback"
          elif [ -n "${FIREBASE_TOKEN:-}" ]; then
            AUTH_METHOD="deprecated_token"
            echo "⚠️ WARNING: FIREBASE_TOKEN is deprecated. Use FIREBASE_SERVICE_ACCOUNT_JSON or GOOGLE_PLAY_JSON_KEY for reliable 2026 authentication."
          else
            echo "❌ Firebase authentication required. Set FIREBASE_SERVICE_ACCOUNT_JSON (preferred) or GOOGLE_PLAY_JSON_KEY (fallback) or FIREBASE_TOKEN (deprecated)."
            exit 1
          fi

          echo "✅ Firebase auth method: $AUTH_METHOD"

      - name: Preflight release checks (Android)
        run: bash scripts/preflight-release.sh --platform android --layer 1

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Create google-services.json
        working-directory: android
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Resolve Firebase app id
        id: firebase
        working-directory: android
        env:
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
        run: |
          set -euo pipefail
          APP_ID="$(jq -r '.client[0].client_info.mobilesdk_app_id // empty' app/google-services.json)"
          if [ -z "$APP_ID" ] && [ -n "${FIREBASE_ANDROID_APP_ID:-}" ]; then
            APP_ID="$FIREBASE_ANDROID_APP_ID"
          fi
          if [ -z "$APP_ID" ]; then
            echo "❌ Could not resolve Firebase Android app id. Set FIREBASE_ANDROID_APP_ID secret or include mobilesdk_app_id in GOOGLE_SERVICES_JSON."
            exit 1
          fi
          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved Firebase app id: $APP_ID"

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/release.keystore

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew assembleRelease --no-daemon

      - name: Verify APK is signed
        run: |
          set -euo pipefail
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK not found at $APK_PATH"
            exit 1
          fi
          # Use apksigner from Android SDK build-tools (available on ubuntu-latest via setup-java)
          APKSIGNER=$(find /usr/local/lib/android/sdk/build-tools -name "apksigner" -type f 2>/dev/null | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            echo "⚠️ apksigner not found via SDK path, trying PATH"
            APKSIGNER=$(command -v apksigner || true)
          fi
          if [ -z "$APKSIGNER" ]; then
            echo "❌ apksigner not available — cannot verify APK signature"
            exit 1
          fi
          "$APKSIGNER" verify --verbose "$APK_PATH"
          echo "✅ APK signature verified"

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Prepare Firebase auth credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          set -euo pipefail

          # Priority 1: FIREBASE_SERVICE_ACCOUNT_JSON (dedicated Firebase SA)
          if [ -n "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            CREDENTIALS_FILE="${RUNNER_TEMP}/firebase-sa.json"
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$CREDENTIALS_FILE"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDENTIALS_FILE" >> "$GITHUB_ENV"
            echo "✅ Using FIREBASE_SERVICE_ACCOUNT_JSON for Firebase authentication"
          # Priority 2: GOOGLE_PLAY_JSON_KEY (fallback)
          elif [ -n "${GOOGLE_PLAY_JSON_KEY:-}" ]; then
            CREDENTIALS_FILE="${RUNNER_TEMP}/gcp-sa.json"
            printf '%s' "$GOOGLE_PLAY_JSON_KEY" > "$CREDENTIALS_FILE"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDENTIALS_FILE" >> "$GITHUB_ENV"
            echo "✅ Using GOOGLE_PLAY_JSON_KEY as fallback for Firebase authentication"
          fi

      - name: Distribute to internal Firebase tester(s)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_INTERNAL_TESTERS: ${{ vars.FIREBASE_INTERNAL_TESTERS }}
          FIREBASE_INTERNAL_GROUPS: ${{ vars.FIREBASE_INTERNAL_GROUPS }}
          FIREBASE_REQUIRED_TESTER_EMAIL: ${{ vars.FIREBASE_REQUIRED_TESTER_EMAIL }}
          FIREBASE_APP_ID: ${{ steps.firebase.outputs.app_id }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || 'openclaw-console-mobile' }}
        run: |
          set -Eeuo pipefail
          trap 'rc=$?; echo "❌ Firebase distribution failed at line $LINENO: $BASH_COMMAND (rc=$rc)"; exit $rc' ERR

          # Validate Firebase project configuration
          echo "🔍 Pre-flight Firebase project verification"
          # Validate Firebase project exists in accessible projects list
          if ! firebase projects:list --json | jq -e '.result[] | select(.projectId == "openclaw-console-mobile")' > /dev/null; then
            echo "❌ Firebase project openclaw-console-mobile not accessible or does not exist"
            exit 1
          fi

          # Validate package name matches Firebase app
          echo "🔍 Validating package name consistency"
          BUILD_PACKAGE=$(grep -o 'applicationId = "[^"]*"' android/app/build.gradle.kts | sed 's/applicationId = "\(.*\)"/\1/')
          if [ "$BUILD_PACKAGE" != "com.openclaw.console" ]; then
            echo "❌ Package name mismatch: build.gradle.kts=$BUILD_PACKAGE expected=com.openclaw.console"
            exit 1
          fi

          # Determine authentication method with explicit precedence
          AUTH_MODE=""
          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS:-}" ] && [ -f "${GOOGLE_APPLICATION_CREDENTIALS}" ]; then
            AUTH_MODE="service_account"
            # Clear deprecated token to prevent confusion
            unset FIREBASE_TOKEN
            echo "✅ Using service account authentication (2026 best practice)"
          elif [ -n "${FIREBASE_TOKEN:-}" ]; then
            AUTH_MODE="deprecated_token"
            echo "⚠️ WARNING: Using deprecated FIREBASE_TOKEN - may fail silently or not send emails"
          else
            echo "❌ No valid Firebase authentication found"
            exit 1
          fi

          # Prepare distribution command
          TESTERS="${FIREBASE_INTERNAL_TESTERS:-}"
          DIST_GROUPS="${FIREBASE_INTERNAL_GROUPS:-}"
          REQUIRED_TESTER="${FIREBASE_REQUIRED_TESTER_EMAIL:-}"
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"

          # Add required tester if specified
          if [ -n "$REQUIRED_TESTER" ]; then
            if [ -n "$TESTERS" ]; then
              # Check if already included
              if [[ ",$TESTERS," != *",$REQUIRED_TESTER,"* ]]; then
                TESTERS="$TESTERS,$REQUIRED_TESTER"
                echo "Added required Firebase tester: $REQUIRED_TESTER"
              fi
            else
              TESTERS="$REQUIRED_TESTER"
            fi
          fi

          # Build Firebase command
          BASE_CMD=(
            firebase appdistribution:distribute
            "$APK_PATH"
            --app "$FIREBASE_APP_ID"
            --project "$FIREBASE_PROJECT_ID"
            --release-notes "Internal auto-distribution from develop (${GITHUB_SHA})"
          )

          if [ "$AUTH_MODE" = "deprecated_token" ]; then
            BASE_CMD+=(--token "$FIREBASE_TOKEN")
          fi

          # Execute distribution with retry logic
          ATTEMPT=1
          MAX_ATTEMPTS=3
          SUCCESS=false

          while [ $ATTEMPT -le $MAX_ATTEMPTS ] && [ "$SUCCESS" = false ]; do
            echo "🚀 Firebase distribution attempt $ATTEMPT/$MAX_ATTEMPTS (auth=$AUTH_MODE)"

            DIST_CMD=("${BASE_CMD[@]}")
            if [ -n "$TESTERS" ] && [ -n "$DIST_GROUPS" ]; then
              DIST_CMD+=(--testers "$TESTERS" --groups "$DIST_GROUPS")
            elif [ -n "$TESTERS" ]; then
              DIST_CMD+=(--testers "$TESTERS")
            elif [ -n "$DIST_GROUPS" ]; then
              DIST_CMD+=(--groups "$DIST_GROUPS")
            fi

            if "${DIST_CMD[@]}"; then
              SUCCESS=true
              echo "✅ Firebase distribution successful on attempt $ATTEMPT"
            else
              rc=$?
              echo "❌ Attempt $ATTEMPT failed with exit code $rc"
              
              # Fallback to token if permission error (403) and token is available
              if [ $rc -eq 1 ] && [ "$AUTH_MODE" = "service_account" ] && [ -n "${FIREBASE_TOKEN:-}" ]; then
                echo "⚠️ Detected potential permission error with service account. Attempting fallback to FIREBASE_TOKEN..."
                TOKEN_CMD=("${BASE_CMD[@]}" --token "$FIREBASE_TOKEN")
                if [ -n "$TESTERS" ] && [ -n "$DIST_GROUPS" ]; then
                  TOKEN_CMD+=(--testers "$TESTERS" --groups "$DIST_GROUPS")
                elif [ -n "$TESTERS" ]; then
                  TOKEN_CMD+=(--testers "$TESTERS")
                elif [ -n "$DIST_GROUPS" ]; then
                  TOKEN_CMD+=(--groups "$DIST_GROUPS")
                fi
                
                if "${TOKEN_CMD[@]}"; then
                  SUCCESS=true
                  echo "✅ Firebase distribution successful via FIREBASE_TOKEN fallback"
                  break
                fi
              fi

              if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
                echo "❌ All distribution attempts failed"
                exit 1
              fi
              ((ATTEMPT++))
              sleep 5
            fi
          done

      - name: Verify Firebase distribution actually worked
        env:
          FIREBASE_APP_ID: ${{ steps.firebase.outputs.app_id }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || 'openclaw-console-mobile' }}
        run: |
          set -euo pipefail

          echo "🔍 Verifying Firebase distribution delivery"

          # Get latest release info to verify upload worked
          RELEASES_JSON=$(firebase appdistribution:releases:list \
            --app "$FIREBASE_APP_ID" \
            --project "$FIREBASE_PROJECT_ID" \
            --format=json || echo "[]")
          
          # Handle both top-level array and object with result array
          RELEASE_INFO=$(echo "$RELEASES_JSON" | jq -r 'if type == "array" then .[0] else (.result[0]? // .releases[0]?) end | select(. != null)')

          if [ -z "$RELEASE_INFO" ] || [ "$RELEASE_INFO" = "null" ]; then
            echo "❌ Silent failure detected - no releases found in Firebase console for project $FIREBASE_PROJECT_ID"
            exit 1
          fi

          RELEASE_ID=$(echo "$RELEASE_INFO" | jq -r '.name // empty')
          BUILD_VERSION=$(echo "$RELEASE_INFO" | jq -r '.buildVersion // empty')

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "❌ Silent failure detected - release ID not found"
            exit 1
          fi

          echo "📱 Latest release: $RELEASE_ID (build: $BUILD_VERSION)"

          # Verify tester configuration
          TESTERS_JSON=$(firebase appdistribution:testers:list \
            --app "$FIREBASE_APP_ID" \
            --project "$FIREBASE_PROJECT_ID" \
            --format=json || echo "[]")
          
          TESTER_COUNT=$(echo "$TESTERS_JSON" | jq 'if type == "array" then length else ((.testers | length)? // (.result | length)? // 0) end')

          if [ "$TESTER_COUNT" -eq 0 ]; then
            echo "⚠️ WARNING: No testers configured - build uploaded but no email invitations sent"
          else
            echo "📧 Distribution verified: Release $RELEASE_ID sent to $TESTER_COUNT testers"
          fi

          # Get Firebase console URL for manual verification
          CONSOLE_URL="https://console.firebase.google.com/project/$FIREBASE_PROJECT_ID/appdistribution/app/android:com.openclaw.console"
          echo "🔗 Firebase console: $CONSOLE_URL"

          echo "✅ Firebase App Distribution verification complete"

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk-internal
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f /tmp/release.keystore
