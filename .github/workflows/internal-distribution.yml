name: Internal Distribution

on:
  workflow_run:
    workflows: ["iOS CI", "Android CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to distribute (optional, defaults to develop)"

concurrency:
  group: internal-distribution-${{ github.event_name }}-${{ github.ref_name || inputs.ref || github.event.workflow_run.head_branch || 'manual' }}
  cancel-in-progress: true

jobs:
  ios-testflight-internal:
    name: iOS TestFlight (Internal)
    runs-on: macos-15
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.ref || 'develop' }}

      - name: Detect iOS Xcode project
        id: ios_project
        run: |
          if [ -f "ios/OpenClawConsole/OpenClawConsole.xcodeproj/project.pbxproj" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip TestFlight upload when xcodeproj is not committed
        if: steps.ios_project.outputs.present != 'true'
        run: |
          echo "Skipping iOS TestFlight distribution because ios/OpenClawConsole/OpenClawConsole.xcodeproj is missing."
          echo "Commit the Xcode project to enable CI TestFlight uploads."

      - name: Setup Ruby
        if: steps.ios_project.outputs.present == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios/OpenClawConsole

      - name: Install Fastlane
        if: steps.ios_project.outputs.present == 'true'
        run: gem install fastlane
        working-directory: ios/OpenClawConsole

      - name: Write App Store Connect key
        if: steps.ios_project.outputs.present == 'true'
        env:
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          if [ -z "${APPSTORE_PRIVATE_KEY:-}" ] || [ -z "${APPSTORE_KEY_ID:-}" ]; then
            echo "Missing APPSTORE_PRIVATE_KEY or APPSTORE_KEY_ID"
            exit 1
          fi
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Build and upload to TestFlight
        if: steps.ios_project.outputs.present == 'true'
        env:
          CI: "true"
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: fastlane beta
        working-directory: ios/OpenClawConsole

      - name: Upload IPA artifact
        if: always() && steps.ios_project.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-internal
          path: ios/OpenClawConsole/*.ipa
          if-no-files-found: warn

  android-firebase-internal:
    name: Android Firebase App Distribution (Internal)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.ref || 'develop' }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "${GOOGLE_SERVICES_JSON:-}" ]; then
            echo "Missing GOOGLE_SERVICES_JSON secret"
            exit 1
          fi
          mkdir -p android/app
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/release.keystore

      - name: Build Release APK
        env:
          KEYSTORE_PATH: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        working-directory: android

      - name: Resolve APK path
        id: apk
        run: |
          APK_PATH="$(find android/app/build/outputs/apk/release -type f -name '*.apk' | grep -v 'unsigned' | head -n 1 || true)"
          if [ -z "$APK_PATH" ]; then
            APK_PATH="$(find android/app/build/outputs/apk/release -type f -name '*.apk' | head -n 1 || true)"
          fi
          if [ -z "$APK_PATH" ]; then
            echo "No release APK found under android/app/build/outputs/apk/release"
            exit 1
          fi
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          cp "$APK_PATH" android/app/build/outputs/apk/release/app-release.apk
          echo "canonical=android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"

      - name: Verify APK signature
        run: |
          APKSIGNER="$(find /usr/local/lib/android/sdk/build-tools -name apksigner -type f | sort -V | tail -n 1)"
          if [ -z "$APKSIGNER" ]; then
            echo "apksigner not found"
            exit 1
          fi
          "$APKSIGNER" verify --verbose "${{ steps.apk.outputs.canonical }}"

      - name: Build and Distribute to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON || secrets.GOOGLE_PLAY_JSON_KEY }}
          groups: developers
          testers: ${{ secrets.FIREBASE_INTERNAL_TESTERS || vars.FIREBASE_INTERNAL_TESTERS || 'ig5973700@gmail.com' }}
          file: ${{ steps.apk.outputs.canonical }}
          releaseNotes: "GSD Internal build (${{ github.sha }})"

      - name: Upload Android APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-internal
          path: ${{ steps.apk.outputs.canonical }}
          if-no-files-found: warn
