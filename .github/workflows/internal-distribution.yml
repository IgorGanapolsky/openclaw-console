name: Internal Distribution

on:
  workflow_run:
    workflows: ["iOS CI", "Android CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to distribute (optional, defaults to develop)"
        required: false
        type: string

concurrency:
  group: internal-distribution-${{ github.event_name }}-${{ github.event.workflow_run.head_branch || inputs.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate Internal Distribution
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      ref: ${{ steps.decide.outputs.ref }}
      sha: ${{ steps.decide.outputs.sha }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - name: Decide whether to run
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail

          SHOULD_RUN="false"
          REF=""
          SHA=""
          REASON="not_eligible"

          # Allow manual dispatches from anywhere, or automatic runs from develop/main/feature branches
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            REF="${INPUT_REF:-$GITHUB_REF_NAME}"
            SHOULD_RUN="true"
            REASON="manual_dispatch"
          elif [[ "$EVENT_NAME" == "workflow_run" && "$WORKFLOW_CONCLUSION" == "success" ]]; then
            REF="$WORKFLOW_SHA"
            SHA="$WORKFLOW_SHA"
            SHOULD_RUN="true"
            REASON="ci_green_on_${WORKFLOW_BRANCH}"
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "gate: should_run=$SHOULD_RUN reason=$REASON ref=$REF sha=$SHA"

  ios-testflight-internal:
    name: iOS TestFlight (Internal)
    needs: [gate]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: macos-15
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.ref }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios/OpenClawConsole

      - name: Build and upload to TestFlight
        env:
          CI: "true"
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: |
          gem install fastlane
          bundle exec fastlane beta
        working-directory: ios/OpenClawConsole

  android-firebase-internal:
    name: Android Firebase App Distribution (Internal)
    needs: [gate]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.ref }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: android

      - name: Distribute to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
        run: |
          ./gradlew assembleRelease --no-daemon
          npm install -g firebase-tools
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          firebase appdistribution:distribute "$APK_PATH" \
            --app "$FIREBASE_ANDROID_APP_ID" \
            --testers "ig5973700@gmail.com" \
            --release-notes "GSD Internal build (${GITHUB_SHA})" \
            --token "$FIREBASE_TOKEN"
        working-directory: android
