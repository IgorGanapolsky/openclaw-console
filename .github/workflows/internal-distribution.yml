name: Internal Distribution

on:
  workflow_run:
    workflows: ["iOS CI", "Android CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to distribute (optional, defaults to develop)"

concurrency:
  group: internal-distribution-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  ios-testflight-internal:
    name: iOS TestFlight (Internal)
    runs-on: macos-15
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.ref || 'develop' }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios/OpenClawConsole

      - name: Build and upload to TestFlight
        env:
          CI: "true"
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: |
          gem install fastlane
          bundle exec fastlane beta
        working-directory: ios/OpenClawConsole

  android-firebase-internal:
    name: Android Firebase App Distribution (Internal)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.ref || 'develop' }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: android

      - name: Distribute to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
        run: |
          ./gradlew assembleRelease --no-daemon
          npm install -g firebase-tools
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          firebase appdistribution:distribute "$APK_PATH" \
            --app "$FIREBASE_ANDROID_APP_ID" \
            --testers "ig5973700@gmail.com" \
            --release-notes "GSD Internal build (${GITHUB_SHA})" \
            --token "$FIREBASE_TOKEN"
        working-directory: android
