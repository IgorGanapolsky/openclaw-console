name: Internal Distribution

on:
  workflow_run:
    workflows: ["iOS CI", "Android CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to distribute (optional, defaults to develop)"
        required: false
        type: string

concurrency:
  group: internal-distribution-${{ github.event_name }}-${{ github.event.workflow_run.head_branch || inputs.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate Internal Distribution
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      ref: ${{ steps.decide.outputs.ref }}
      sha: ${{ steps.decide.outputs.sha }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - name: Decide whether to run
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail

          SHOULD_RUN="false"
          REF=""
          SHA=""
          REASON="not_eligible"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            REF="${INPUT_REF:-$GITHUB_REF_NAME}"
            SHOULD_RUN="true"
            REASON="manual_dispatch"
          elif [[ "$EVENT_NAME" == "workflow_run" && "$WORKFLOW_CONCLUSION" == "success" ]]; then
            REF="$WORKFLOW_SHA"
            SHA="$WORKFLOW_SHA"
            SHOULD_RUN="true"
            REASON="ci_green_on_${WORKFLOW_BRANCH}"
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "gate: should_run=$SHOULD_RUN reason=$REASON ref=$REF sha=$SHA"

  ios-testflight-internal:
    name: iOS TestFlight (Internal)
    needs: [gate]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: macos-15
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.ref }}

      - name: Fail fast on required iOS distribution secrets
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          set -euo pipefail
          for name in MATCH_GIT_URL MATCH_PASSWORD MATCH_GIT_BASIC_AUTHORIZATION APPSTORE_PRIVATE_KEY APPSTORE_KEY_ID APPSTORE_ISSUER_ID; do
            if [ -z "${!name:-}" ]; then
              echo "❌ Missing required secret: $name"
              exit 1
            fi
          done

      - name: Preflight release checks (iOS)
        run: bash scripts/preflight-release.sh --platform ios --layer 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios/OpenClawConsole

      - name: Install Fastlane
        run: gem install fastlane
        working-directory: ios/OpenClawConsole

      - name: Write App Store Connect key
        env:
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Configure git credentials for match
        run: |
          set -euo pipefail
          echo "✅ Using pre-configured MATCH_GIT_BASIC_AUTHORIZATION for fastlane match"

      - name: Setup signing certificates and profiles (match)
        env:
          CI: "true"
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane setup
        working-directory: ios/OpenClawConsole

      - name: Build and upload to TestFlight
        env:
          CI: "true"
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
          FASTLANE_XCODEBUILD_SETTINGS_RETRIES: "6"
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          TESTFLIGHT_GROUPS: ${{ vars.TESTFLIGHT_INTERNAL_GROUPS || secrets.TESTFLIGHT_GROUPS || 'Internal Testers' }}
          TESTFLIGHT_DISTRIBUTE_EXTERNAL: "false"
          TESTFLIGHT_NOTIFY_EXTERNAL_TESTERS: "false"
        run: bundle exec fastlane beta
        working-directory: ios/OpenClawConsole

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ios-ipa-internal
          path: ios/OpenClawConsole/OpenClawConsole.ipa
          if-no-files-found: warn

  android-firebase-internal:
    name: Android Firebase App Distribution (Internal)
    needs: [gate]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.ref }}

      - name: Fail fast on Firebase distribution auth inputs
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_INTERNAL_GROUPS: ${{ vars.FIREBASE_INTERNAL_GROUPS }}
          FIREBASE_INTERNAL_TESTERS: ${{ vars.FIREBASE_INTERNAL_TESTERS }}
          FIREBASE_REQUIRED_TESTER_EMAIL: ${{ vars.FIREBASE_REQUIRED_TESTER_EMAIL }}
        run: |
          set -euo pipefail
          for name in GOOGLE_SERVICES_JSON ANDROID_KEYSTORE_BASE64 FIREBASE_ANDROID_APP_ID; do
            if [ -z "${!name:-}" ]; then
              echo "❌ Missing required secret: $name"
              exit 1
            fi
          done

          # Firebase authentication validation with fallback
          AUTH_METHOD=""
          if [ -n "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            AUTH_METHOD="service_account_primary"
          elif [ -n "${GOOGLE_PLAY_JSON_KEY:-}" ]; then
            AUTH_METHOD="service_account_fallback"
          else
            echo "❌ Firebase authentication required. Set FIREBASE_SERVICE_ACCOUNT_JSON or GOOGLE_PLAY_JSON_KEY."
            exit 1
          fi
          echo "✅ Firebase auth method: $AUTH_METHOD"
          COMBINED_FIREBASE_TESTERS="$(
            python3 - <<'PY'
          import os

          seen = set()
          testers = []
          for value in (
              os.environ.get("FIREBASE_INTERNAL_TESTERS", ""),
              os.environ.get("FIREBASE_REQUIRED_TESTER_EMAIL", ""),
          ):
              for raw_email in value.split(","):
                  email = raw_email.strip()
                  if not email:
                      continue
                  key = email.lower()
                  if key in seen:
                      continue
                  seen.add(key)
                  testers.append(email)
          print(",".join(testers))
          PY
          )"
          # Prefer groups over individual testers; default to 'internal-testers'
          # group which matches the alias created in Firebase Console.
          if [ -z "${FIREBASE_INTERNAL_GROUPS:-}" ] && [ -z "$COMBINED_FIREBASE_TESTERS" ]; then
            echo "⚠️ Neither FIREBASE_INTERNAL_GROUPS nor FIREBASE_INTERNAL_TESTERS set — defaulting groups to 'internal-testers'"
            echo "FIREBASE_INTERNAL_GROUPS=internal-testers" >> "$GITHUB_ENV"
          fi
          if [ -n "${FIREBASE_INTERNAL_GROUPS:-}" ]; then
            echo "FIREBASE_INTERNAL_GROUPS=${FIREBASE_INTERNAL_GROUPS}" >> "$GITHUB_ENV"
          fi
          if [ -n "$COMBINED_FIREBASE_TESTERS" ]; then
            echo "FIREBASE_INTERNAL_TESTERS=${COMBINED_FIREBASE_TESTERS}" >> "$GITHUB_ENV"
          fi
          if ! [[ "$FIREBASE_ANDROID_APP_ID" =~ ^1:[0-9]+:android:[a-fA-F0-9]+$ ]]; then
            echo "❌ FIREBASE_ANDROID_APP_ID must match 1:PROJECT_NUMBER:android:APP_ID (e.g. 1:712918404489:android:5fb1dfde1d712f53e7a558)"
            exit 1
          fi

      - name: Preflight release checks (Android)
        run: bash scripts/preflight-release.sh --platform android --layer 1

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Create google-services.json
        working-directory: android
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
        run: |
          set -euo pipefail

          # Write the Google Services JSON
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

          # Extract project info from the file and secrets for validation
          GS_PROJECT_ID="$(jq -r '.project_info.project_id // empty' app/google-services.json)"
          GS_APP_ID="$(jq -r '.client[0].client_info.mobilesdk_app_id // empty' app/google-services.json)"

          echo "📋 Firebase project configuration:"
          echo "  google-services.json project_id: $GS_PROJECT_ID"
          echo "  google-services.json app_id: $GS_APP_ID"
          echo "  FIREBASE_PROJECT_ID secret: ${FIREBASE_PROJECT_ID:-'(not set)'}"
          echo "  FIREBASE_ANDROID_APP_ID secret: ${FIREBASE_ANDROID_APP_ID:-'(not set)'}"

          # Validate consistency between file and secrets
          if [ -n "${FIREBASE_PROJECT_ID:-}" ] && [ "$GS_PROJECT_ID" != "$FIREBASE_PROJECT_ID" ]; then
            echo "⚠️ WARNING: Project ID mismatch between google-services.json ($GS_PROJECT_ID) and FIREBASE_PROJECT_ID secret ($FIREBASE_PROJECT_ID)"
          fi

          if [ -n "${FIREBASE_ANDROID_APP_ID:-}" ] && [ "$GS_APP_ID" != "$FIREBASE_ANDROID_APP_ID" ]; then
            echo "⚠️ WARNING: App ID mismatch between google-services.json ($GS_APP_ID) and FIREBASE_ANDROID_APP_ID secret ($FIREBASE_ANDROID_APP_ID)"
          fi

      - name: Resolve Firebase app id
        id: firebase
        working-directory: android
        env:
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
        run: |
          set -euo pipefail

          # First try to get app ID from google-services.json
          GS_APP_ID="$(jq -r '.client[0].client_info.mobilesdk_app_id // empty' app/google-services.json)"

          # Use secret if available and different (indicating project mismatch fix needed)
          if [ -n "${FIREBASE_ANDROID_APP_ID:-}" ]; then
            APP_ID="$FIREBASE_ANDROID_APP_ID"
            if [ -n "$GS_APP_ID" ] && [ "$GS_APP_ID" != "$FIREBASE_ANDROID_APP_ID" ]; then
              echo "🔄 Using FIREBASE_ANDROID_APP_ID secret ($FIREBASE_ANDROID_APP_ID) instead of google-services.json app id ($GS_APP_ID)"
            fi
          elif [ -n "$GS_APP_ID" ]; then
            APP_ID="$GS_APP_ID"
            echo "📱 Using app id from google-services.json: $GS_APP_ID"
          else
            echo "❌ Could not resolve Firebase Android app id. Set FIREBASE_ANDROID_APP_ID secret or include mobilesdk_app_id in GOOGLE_SERVICES_JSON."
            exit 1
          fi

          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"
          echo "✅ Resolved Firebase app id: $APP_ID"

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/release.keystore

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew assembleRelease --no-daemon

      - name: Verify APK is signed
        run: |
          set -euo pipefail
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK not found at $APK_PATH"
            exit 1
          fi
          # Use apksigner from Android SDK build-tools (available on ubuntu-latest via setup-java)
          APKSIGNER=$(find /usr/local/lib/android/sdk/build-tools -name "apksigner" -type f 2>/dev/null | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            echo "⚠️ apksigner not found via SDK path, trying PATH"
            APKSIGNER=$(command -v apksigner || true)
          fi
          if [ -z "$APKSIGNER" ]; then
            echo "❌ apksigner not available — cannot verify APK signature"
            exit 1
          fi
          "$APKSIGNER" verify --verbose "$APK_PATH"
          echo "✅ APK signature verified"

      - name: Prepare Firebase service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          set -euo pipefail

          # Priority 1: FIREBASE_SERVICE_ACCOUNT_JSON (dedicated Firebase SA)
          if [ -n "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            CREDENTIALS_FILE="${RUNNER_TEMP}/firebase-sa.json"
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$CREDENTIALS_FILE"
            echo "FIREBASE_CREDENTIALS_FILE=$CREDENTIALS_FILE" >> "$GITHUB_ENV"
            echo "✅ Using FIREBASE_SERVICE_ACCOUNT_JSON for Firebase authentication"
          # Priority 2: GOOGLE_PLAY_JSON_KEY (fallback)
          elif [ -n "${GOOGLE_PLAY_JSON_KEY:-}" ]; then
            CREDENTIALS_FILE="${RUNNER_TEMP}/gcp-sa.json"
            printf '%s' "$GOOGLE_PLAY_JSON_KEY" > "$CREDENTIALS_FILE"
            echo "FIREBASE_CREDENTIALS_FILE=$CREDENTIALS_FILE" >> "$GITHUB_ENV"
            echo "✅ Using GOOGLE_PLAY_JSON_KEY as fallback for Firebase authentication"
          else
            echo "❌ No Firebase service account credentials available"
            exit 1
          fi

      - name: Distribute to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@bd494989dd4bec0343f78adee87fe66e48279ad6
        id: firebase_dist
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFile: ${{ env.FIREBASE_CREDENTIALS_FILE }}
          testers: ${{ env.FIREBASE_INTERNAL_TESTERS }}
          groups: ${{ env.FIREBASE_INTERNAL_GROUPS }}
          file: android/app/build/outputs/apk/release/app-release.apk
          releaseNotes: |
            Internal build from ${{ needs.gate.outputs.sha || github.sha }}
            Ref: ${{ needs.gate.outputs.ref }}

      - name: Verify Firebase distribution read-back
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_INTERNAL_GROUPS: ${{ env.FIREBASE_INTERNAL_GROUPS }}
          FIREBASE_INTERNAL_TESTERS: ${{ env.FIREBASE_INTERNAL_TESTERS }}
        run: |
          set -euo pipefail
          echo "✅ Firebase distribution completed via GitHub Action"
          echo "🔗 Firebase console: https://console.firebase.google.com/project/random-timer-dist-new/appdistribution/app/android:com.openclaw.console"

      - name: Run Firebase App Testing Agent (Android)
        # Opt-in feature: must be enabled per-project in the Firebase console.
        # Runs AI-driven UI smoke tests against the APK that was just distributed.
        # Non-blocking: failures are logged but do not fail the distribution job, because
        # the App Testing Agent is a preview feature with a 5-minute per-test timeout and
        # a 200 tests/month default quota per project. Flip APPTESTING_BLOCKING=true to
        # promote this to a gating check once it's stable for this app.
        if: ${{ hashFiles('android/apptesting/**/*.yml') != '' }}
        env:
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          APPTESTING_BLOCKING: ${{ vars.APPTESTING_BLOCKING || 'false' }}
        run: |
          set -euo pipefail
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          TEST_DIR="android/apptesting"

          echo "🤖 Running Firebase App Testing Agent against $APK_PATH"
          echo "   Test dir: $TEST_DIR"
          echo "   App:      $FIREBASE_ANDROID_APP_ID"

          # Setup Firebase CLI and credentials
          npm install -g firebase-tools@latest

          CREDENTIALS_FILE="${RUNNER_TEMP}/firebase-sa.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$CREDENTIALS_FILE"
          export GOOGLE_APPLICATION_CREDENTIALS="$CREDENTIALS_FILE"

          # Fire-and-forget non-blocking by default — results land in the Firebase console.
          if bash scripts/firebase-apptesting-execute.sh \
              --apk "$APK_PATH" \
              --test-dir "$TEST_DIR" \
              --non-blocking; then
            echo "✅ App Testing Agent execution queued"
            echo "🔗 Results: https://console.firebase.google.com/project/random-timer-dist-new/apptesting"
          else
            rc=$?
            echo "⚠️ App Testing Agent failed with exit code $rc"
            echo "   Most common causes: (1) feature not opted-in for project in console,"
            echo "   (2) service account lacks firebaseapptesting.admin role,"
            echo "   (3) monthly quota exceeded (default 200 tests/month)."
            if [ "${APPTESTING_BLOCKING}" = "true" ]; then
              exit $rc
            fi
            echo "   APPTESTING_BLOCKING=false → not failing the distribution job."
          fi

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: android-apk-internal
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f /tmp/release.keystore
