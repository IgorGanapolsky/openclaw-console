name: Internal Distribution

on:
  workflow_run:
    workflows: ["iOS CI", "Android CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to distribute (optional, defaults to develop)"

concurrency:
  group: internal-distribution-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  ios-testflight-internal:
    name: iOS TestFlight (Internal)
    runs-on: macos-15
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.ref || 'develop' }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios/OpenClawConsole

      - name: Install Fastlane
        run: gem install fastlane
        working-directory: ios/OpenClawConsole

      - name: Write App Store Connect key
        env:
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Build and upload to TestFlight
        env:
          CI: "true"
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: fastlane beta
        working-directory: ios/OpenClawConsole

  android-firebase-internal:
    name: Android Firebase App Distribution (Internal)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.ref || 'develop' }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: android

      - name: Install Fastlane
        run: gem install fastlane
        working-directory: android

      - name: Build and Distribute to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON || secrets.GOOGLE_PLAY_JSON_KEY }}
          groups: developers
          testers: ig5973700@gmail.com
          file: android/app/build/outputs/apk/release/app-release.apk
          releaseNotes: "GSD Internal build (${{ github.sha }})"
