name: Internal Distribution

on:
  workflow_run:
    workflows: ["iOS CI", "Android CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to distribute (optional, defaults to develop)"
        required: false
        type: string

concurrency:
  group: internal-distribution-${{ github.event_name }}-${{ github.event.workflow_run.head_branch || inputs.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate Internal Distribution
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      ref: ${{ steps.decide.outputs.ref }}
      sha: ${{ steps.decide.outputs.sha }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - name: Decide whether to run
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail

          SHOULD_RUN="false"
          REF=""
          SHA=""
          REASON="not_eligible"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            REF="${INPUT_REF:-develop}"
            SHOULD_RUN="true"
            REASON="manual_dispatch"
          elif [[ "$EVENT_NAME" == "workflow_run" && "$WORKFLOW_CONCLUSION" == "success" && ("$WORKFLOW_BRANCH" == "develop" || "$WORKFLOW_BRANCH" == "main") ]]; then
            REF="$WORKFLOW_SHA"
            SHA="$WORKFLOW_SHA"
            SHOULD_RUN="true"
            REASON="ci_green_on_${WORKFLOW_BRANCH}"
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "gate: should_run=$SHOULD_RUN reason=$REASON ref=$REF sha=$SHA"

  ios-testflight-internal:
    name: iOS TestFlight (Internal)
    needs: [gate]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: macos-15
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.ref }}

      - name: Fail fast on required iOS distribution secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          set -euo pipefail
          for name in APPLE_TEAM_ID APPSTORE_PRIVATE_KEY APPSTORE_KEY_ID APPSTORE_ISSUER_ID; do
            if [ -z "${!name:-}" ]; then
              echo "❌ Missing required secret: $name"
              exit 1
            fi
          done

      - name: Preflight release checks (iOS)
        run: bash scripts/preflight-release.sh --platform ios --layer 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios/OpenClawConsole

      - name: Install Fastlane
        run: gem install fastlane
        working-directory: ios/OpenClawConsole

      - name: Write App Store Connect key
        env:
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Configure git credentials for match
        env:
          GIT_AUTH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          git config --global url."https://x-access-token:${GIT_AUTH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Setup signing certificates and profiles (match)
        id: signing_setup
        continue-on-error: true
        env:
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: fastlane setup
        working-directory: ios/OpenClawConsole

      - name: Detect iOS project file
        id: ios_project
        working-directory: ios/OpenClawConsole
        run: |
          set -euo pipefail
          if [ -f "OpenClawConsole.xcodeproj/project.pbxproj" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "✅ Found OpenClawConsole.xcodeproj"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ OpenClawConsole.xcodeproj is missing; TestFlight upload step will be skipped."
          fi

      - name: Decide iOS upload readiness
        id: ios_ready
        run: |
          set -euo pipefail
          READY="true"
          REASON="ready"
          if [ "${{ steps.ios_project.outputs.present }}" != "true" ]; then
            READY="false"
            REASON="missing_xcode_project"
          elif [ "${{ steps.signing_setup.outcome }}" != "success" ]; then
            READY="false"
            REASON="signing_setup_failed"
          fi
          echo "ready=$READY" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "iOS upload readiness: $READY ($REASON)"

      - name: Build and upload to TestFlight
        if: steps.ios_ready.outputs.ready == 'true'
        env:
          CI: "true"
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: fastlane beta
        working-directory: ios/OpenClawConsole

      - name: Skip TestFlight upload
        if: steps.ios_ready.outputs.ready != 'true'
        run: |
          echo "Skipping TestFlight upload: ${{ steps.ios_ready.outputs.reason }}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-ipa-internal
          path: ios/OpenClawConsole/OpenClawConsole.ipa
          if-no-files-found: warn

  android-firebase-internal:
    name: Android Firebase App Distribution (Internal)
    needs: [gate]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.ref }}

      - name: Fail fast on Android distribution auth inputs
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_SERVICES_JSON:-}" ]; then
            echo "❌ Missing required secret: GOOGLE_SERVICES_JSON"
            exit 1
          fi
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "❌ Missing required secret: ANDROID_KEYSTORE_BASE64"
            exit 1
          fi
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ] && [ -z "${GOOGLE_PLAY_JSON_KEY:-}" ] && [ -z "${FIREBASE_TOKEN:-}" ]; then
            echo "❌ Need one of FIREBASE_SERVICE_ACCOUNT_JSON, GOOGLE_PLAY_JSON_KEY, or FIREBASE_TOKEN for Firebase authentication"
            exit 1
          fi

      - name: Preflight release checks (Android)
        run: bash scripts/preflight-release.sh --platform android --layer 1

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Create google-services.json
        working-directory: android
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Resolve Firebase app id
        id: firebase
        working-directory: android
        env:
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
        run: |
          set -euo pipefail
          EXPECTED_PACKAGE="com.openclaw.console"
          APP_ID="$(jq -r --arg pkg "$EXPECTED_PACKAGE" '
            .client[]?
            | select(.client_info.android_client_info.package_name == $pkg)
            | .client_info.mobilesdk_app_id // empty
          ' app/google-services.json | head -n 1)"
          if [ -z "$APP_ID" ] && [ -n "${FIREBASE_ANDROID_APP_ID:-}" ]; then
            APP_ID="$FIREBASE_ANDROID_APP_ID"
          fi
          if [ -z "$APP_ID" ]; then
            echo "❌ Could not resolve Firebase Android app id for package ${EXPECTED_PACKAGE}. Set FIREBASE_ANDROID_APP_ID or include matching entry in GOOGLE_SERVICES_JSON."
            exit 1
          fi
          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved Firebase app id: $APP_ID"

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/release.keystore

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew assembleRelease --no-daemon

      - name: Resolve release APK path
        id: apk
        run: |
          set -euo pipefail
          APK_PATH="$(find android/app/build/outputs/apk -type f -name '*release*.apk' | sort | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "❌ Could not find a release APK under android/app/build/outputs/apk"
            find android/app/build/outputs/apk -maxdepth 4 -type f || true
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Resolved APK path: $APK_PATH"

      - name: Sign release APK when unsigned
        id: signed_apk
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          APK_PATH="${{ steps.apk.outputs.apk_path }}"
          APKSIGNER=$(find /usr/local/lib/android/sdk/build-tools -name "apksigner" -type f 2>/dev/null | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            APKSIGNER=$(command -v apksigner || true)
          fi

          if [[ "$APK_PATH" == *"-unsigned.apk" ]]; then
            if [ -z "$APKSIGNER" ]; then
              echo "❌ APK is unsigned and apksigner is unavailable; cannot produce distributable APK."
              exit 1
            fi
            SIGNED_APK="${APK_PATH%-unsigned.apk}-signed.apk"
            "$APKSIGNER" sign \
              --ks /tmp/release.keystore \
              --ks-pass "pass:${KEYSTORE_PASSWORD}" \
              --ks-key-alias "${KEY_ALIAS}" \
              --key-pass "pass:${KEY_PASSWORD}" \
              --out "$SIGNED_APK" \
              "$APK_PATH"
            APK_PATH="$SIGNED_APK"
            echo "✅ Signed APK generated: $APK_PATH"
          fi

          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Verify APK is signed
        run: |
          set -euo pipefail
          APK_PATH="${{ steps.signed_apk.outputs.apk_path }}"
          # Use apksigner from Android SDK build-tools (available on ubuntu-latest via setup-java)
          APKSIGNER=$(find /usr/local/lib/android/sdk/build-tools -name "apksigner" -type f 2>/dev/null | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            echo "⚠️ apksigner not found via SDK path, trying PATH"
            APKSIGNER=$(command -v apksigner || true)
          fi
          if [ -z "$APKSIGNER" ]; then
            echo "⚠️ apksigner not available — skipping signature verification"
            exit 0
          fi
          "$APKSIGNER" verify --verbose "$APK_PATH"
          echo "✅ APK signature verified"

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Prepare Firebase auth credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            CREDENTIALS_FILE="${RUNNER_TEMP}/firebase-sa.json"
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$CREDENTIALS_FILE"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDENTIALS_FILE" >> "$GITHUB_ENV"
          elif [ -n "${GOOGLE_PLAY_JSON_KEY:-}" ]; then
            CREDENTIALS_FILE="${RUNNER_TEMP}/gcp-sa.json"
            printf '%s' "$GOOGLE_PLAY_JSON_KEY" > "$CREDENTIALS_FILE"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDENTIALS_FILE" >> "$GITHUB_ENV"
          fi

      - name: Distribute to internal Firebase tester(s)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_INTERNAL_TESTERS: ${{ secrets.FIREBASE_INTERNAL_TESTERS || vars.FIREBASE_INTERNAL_TESTERS }}
          FIREBASE_INTERNAL_GROUPS: ${{ secrets.FIREBASE_INTERNAL_GROUPS || vars.FIREBASE_INTERNAL_GROUPS }}
          FIREBASE_APP_ID: ${{ steps.firebase.outputs.app_id }}
        run: |
          set -Eeuo pipefail
          trap 'rc=$?; echo "❌ Firebase distribution failed at line ${LINENO}: ${BASH_COMMAND} (rc=${rc})"; exit ${rc}' ERR

          normalize_csv() {
            printf '%s' "${1-}" \
              | tr $'\n\r;' ',' \
              | sed -E 's/[[:space:]]*,[[:space:]]*/,/g; s/^[,[:space:]]+//; s/[,[:space:]]+$//; s/,+/,/g'
          }

          TESTERS="${FIREBASE_INTERNAL_TESTERS:-}"
          DIST_GROUPS="${FIREBASE_INTERNAL_GROUPS:-}"
          APK_PATH="${{ steps.signed_apk.outputs.apk_path }}"

          AUTH_MODE=""
          if [ -n "${FIREBASE_TOKEN:-}" ]; then
            AUTH_MODE="token"
          elif [ -n "${GOOGLE_APPLICATION_CREDENTIALS:-}" ] && [ -f "${GOOGLE_APPLICATION_CREDENTIALS}" ]; then
            AUTH_MODE="service-account"
          else
            echo "❌ Missing Firebase auth. Set FIREBASE_SERVICE_ACCOUNT_JSON, GOOGLE_PLAY_JSON_KEY, or FIREBASE_TOKEN."
            exit 1
          fi

          if [ "$AUTH_MODE" = "service-account" ]; then
            unset FIREBASE_TOKEN
          fi

          TESTERS="$(normalize_csv "$TESTERS")"
          DIST_GROUPS="$(normalize_csv "$DIST_GROUPS")"

          BASE_CMD=(
            firebase appdistribution:distribute
            "$APK_PATH"
            --app "$FIREBASE_APP_ID"
            --release-notes "Internal auto-distribution from develop (${GITHUB_SHA})"
          )
          if [ "$AUTH_MODE" = "token" ]; then
            BASE_CMD+=(--token "$FIREBASE_TOKEN")
          fi

          run_dist() {
            local label="$1"
            local log_file="$2"
            shift 2
            echo "Firebase distribution attempt: $label (auth=$AUTH_MODE)"
            set +e
            "${BASE_CMD[@]}" "$@" 2>&1 | tee "$log_file"
            local rc=${PIPESTATUS[0]}
            set -e
            if [ "$rc" -ne 0 ]; then
              echo "Attempt '$label' failed with exit code $rc"
              tail -n 120 "$log_file" || true
            fi
            return "$rc"
          }

          ATTEMPT_ARGS=()
          if [ -n "$TESTERS" ]; then
            ATTEMPT_ARGS+=(--testers "$TESTERS")
          fi
          if [ -n "$DIST_GROUPS" ]; then
            ATTEMPT_ARGS+=(--groups "$DIST_GROUPS")
          fi

          if [ -z "$TESTERS" ] && [ -z "$DIST_GROUPS" ]; then
            echo "No testers/groups configured. Uploading build without invite audience."
          fi

          if run_dist "audience-targeted" /tmp/firebase-dist-attempt1.log "${ATTEMPT_ARGS[@]}"; then
            exit 0
          fi

          if [ -n "$TESTERS" ] && [ -n "$DIST_GROUPS" ]; then
            if run_dist "groups-only-retry" /tmp/firebase-dist-attempt2.log --groups "$DIST_GROUPS"; then
              exit 0
            fi
          fi

          if [ "${#ATTEMPT_ARGS[@]}" -gt 0 ]; then
            echo "Retrying Firebase upload without testers/groups."
            if run_dist "upload-only-retry" /tmp/firebase-dist-attempt3.log; then
              exit 0
            fi
          fi

          echo "Firebase distribution failed after retries."
          exit 1

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk-internal
          path: ${{ steps.signed_apk.outputs.apk_path }}
          if-no-files-found: warn

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f /tmp/release.keystore
