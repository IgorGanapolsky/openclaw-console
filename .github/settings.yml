repository:
  name: openclaw-console
  description: "Native iOS & Android mobile app for supervising OpenClaw agents. Biometric approvals, CI/deploy monitoring, incident alerts — no Telegram, no Slack, no noise."
  homepage: https://github.com/IgorGanapolsky/openclaw-console
  topics: openclaw, mobile, ios, android, swiftui, jetpack-compose, devops, agent-orchestration, developer-tools
  private: false
  has_issues: true
  has_projects: true
  has_wiki: true
  has_downloads: true
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: false
  delete_branch_on_merge: true
  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true

branches:
  - name: main
    protection:
      required_status_checks:
        strict: true
        # Production mirror - only accepts trusted Dependabot, develop, release/*, or hotfix/* merges
        contexts:
          - "Skills Tests"
          - "Architecture Lint (Kotlin)"
          - "Architecture Lint (Swift)"
          - "Android Build Check"
          - "iOS Build Check"
          - "Secrets Scan"
          - "Dependency Audit"
          - "CodeQL Analysis (java-kotlin)"
          - "CodeQL Analysis (javascript-typescript)"
          - "CodeQL Analysis (swift)"
          - "Require develop or release branch"
          - "Claude Review"
      enforce_admins: true
      required_pull_request_reviews:
        required_approving_review_count: 0
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        require_last_push_approval: false
      required_conversation_resolution: false
      restrictions: null
      allow_force_pushes: false
      allow_deletions: false

  - name: develop
    protection:
      required_status_checks:
        strict: true
        # Integration branch - all feature work merges here first
        contexts:
          - "Skills Tests"
          - "Architecture Lint (Kotlin)"
          - "Architecture Lint (Swift)"
      enforce_admins: true
      required_pull_request_reviews:
        required_approving_review_count: 0
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        require_last_push_approval: false
      required_conversation_resolution: false
      restrictions: null
      allow_force_pushes: false
      allow_deletions: false

