name: OpenClawConsole
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.console
targets:
  OpenClawConsole:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OpenClawConsole
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.console
        INFOPLIST_FILE: OpenClawConsole/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "NO"
